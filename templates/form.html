<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<title>Ultra-Advanced Customer Churn Prediction</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- AOS Animation -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">

<style>
/* Animated Gradient Background */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #ff6b6b, #f7d794, #54a0ff, #5f27cd, #1dd1a1);
  background-size: 500% 500%;
  animation: gradientBG 15s ease infinite;
  overflow-x: hidden; /* ✅ allows vertical scrolling */
}

@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* Glassmorphism Card */
.container-glass {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.3);
  z-index: 1;
  position: relative;
  transition: transform 0.4s ease;
}
.container-glass:hover {
  transform: translateY(-5px);
}

/* Heading */
h2 {
  color: #fff;
  font-size: 32px;
  text-align: center;
  font-weight: bold;
  margin-bottom: 25px;
  text-shadow: 0px 4px 10px rgba(0,0,0,0.4);
}

/* Form styling */
.form-label {
  font-weight: 600;
  color: #fff;
}

.form-control, .form-select {
  border-radius: 12px;
  padding: 14px;
  font-size: 15px;
  background: rgba(255, 255, 255, 0.95);
  border: none;
  box-shadow: 0 3px 8px rgba(0,0,0,0.12);
  transition: all 0.3s ease;
}

.form-control:focus, .form-select:focus {
  background: #fff;
  box-shadow: 0 0 10px rgba(255, 107, 107, 0.4);
  outline: none;
}

/* Animated Gradient Button */
.btn-predict {
  background: linear-gradient(270deg, #ff6a00, #ee0979, #00c6ff, #0072ff);
  background-size: 600% 600%;
  animation: btnGradient 8s ease infinite;
  border: none;
  border-radius: 15px;
  padding: 14px;
  font-size: 18px;
  font-weight: bold;
  color: white;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

@keyframes btnGradient {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.btn-predict:hover {
  transform: scale(1.07);
  box-shadow: 0 0 25px rgba(255, 107, 107, 0.7);
}

.input-group-text {
  background: rgba(255,255,255,0.85);
}

/* Responsive tweaks */
@media (max-width: 768px) {
  .container-glass {
    padding: 25px;
  }
}
</style>
</head>
<body>

<!-- Particle Animation -->
<div id="particles-js"></div>

<!-- Main Container -->
<div class="container py-5">
  <div class="col-lg-6 col-md-8 col-sm-10 mx-auto mb-5" data-aos="fade-up">
    <div class="container-glass">
      <h2><i class="fas fa-chart-line"></i> Churn Prediction</h2>
      <form method="POST">

        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select name="gender" class="form-select">
            <option value="1">Male</option>
            <option value="0">Female</option>
          </select>
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="number" name="age" class="form-control" placeholder="Enter age" required>
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-calendar"></i></span>
          <input type="number" name="tenure" class="form-control" placeholder="Tenure (months)">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-dollar-sign"></i></span>
          <input type="number" name="monthlyCharges" class="form-control" placeholder="Monthly Charges ($)">
        </div>

        <div class="mb-3 input-group">
          <span class="input-group-text"><i class="fas fa-money-bill"></i></span>
          <input type="number" name="totalCharges" class="form-control" placeholder="Total Charges ($)">
        </div>

        <div class="mb-3">
          <label class="form-label">Payment Method</label>
          <select name="paymentMethod" class="form-select">
            <option value="0">Bank Transfer</option>
            <option value="1">Credit Card</option>
            <option value="2">Debit Card</option>
            <option value="3">PayPal</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Contract Type</label>
          <select name="contractType" class="form-select">
            <option value="0">Month-to-month</option>
            <option value="1">One-year</option>
            <option value="2">Two-year</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Internet Service</label>
          <select name="internetService" class="form-select">
            <option value="1">Fiber Optic</option>
            <option value="0">DSL</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Streaming Services</label>
          <select name="streamingServices" class="form-select">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label">Tech Support</label>
          <select name="techSupport" class="form-select">
            <option value="1">Yes</option>
            <option value="0">No</option>
          </select>
        </div>

        <button type="submit" class="btn btn-predict w-100 mt-3"><i class="fas fa-magic"></i> Predict Churn</button>

      </form>
    </div>
  </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
AOS.init();

// Particles.js settings
particlesJS("particles-js", {
  "particles": {
    "number": {"value": 40, "density": {"enable": true, "value_area": 800}},
    "shape": {
      "type": "image",
      "image": {
        "src": "https://cdn-icons-png.flaticon.com/512/1077/1077114.png",
        "width": 20,
        "height": 20
      }
    },
    "opacity": {"value": 0.9, "random": true},
    "size": {"value": 20, "random": true},
    "move": {"enable": true, "speed": 2.5, "out_mode": "out"}
  },
  "interactivity": {
    "events": {
      "onhover": {"enable": true, "mode": "repulse"}
    }
  },
  "retina_detect": true
});
</script>

</body>
</html>
